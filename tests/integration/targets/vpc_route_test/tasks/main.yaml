---
- name: VPC Route tests
  module_defaults:
    opentelekomcloud.cloud.vpc_route:
      cloud: "{{ test_cloud }}"
    opentelekomcloud.cloud.vpc_route_info:
      cloud: "{{ test_cloud }}"
    opentelekomcloud.cloud.vpc_peering:
      cloud: "{{ test_cloud }}"
    openstack.cloud.network:
      cloud: "{{ test_cloud }}"
    openstack.cloud.subnet:
      cloud: "{{ test_cloud }}"
    openstack.cloud.router:
      cloud: "{{ test_cloud }}"
  block:
    - name: Set random prefix
      ansible.builtin.set_fact:
        prefix: "{{ 99999999 | random | to_uuid | hash('md5') }}"

    - name: Set initial facts
      ansible.builtin.set_fact:
        network_name_1: "{{ ( prefix + 'vpc_route_test-network_1') }}"
        subnet_name_1: "{{ ( prefix + 'vpc_route_test-subnet_1') }}"
        router_name_1: "{{ ( prefix + 'vpc_route_test-router_1') }}"
        cidr_block_1: "192.168.115"
        network_name_2: "{{ ( prefix + 'vpc_route_test-network_2') }}"
        subnet_name_2: "{{ ( prefix + 'vpc_route_test-subnet_2') }}"
        router_name_2: "{{ ( prefix + 'vpc_route_test-router_2') }}"
        cidr_block_2: "192.168.116"
        vpc_peering_name: "{{ ( prefix + 'vpc_route_test') }}"
        new_peering_name: "{{ ( prefix + 'vpc_route_test_2') }}"
        project_id: "76889f64a23945ab887012b180e95acf"

    - name: Create first network for test
      openstack.cloud.network:
        name: "{{ network_name_1 }}"
        state: present
      register: test_network_1

    - name: Create first subnet for test
      openstack.cloud.subnet:
        name: "{{ subnet_name_1 }}"
        state: present
        network_name: "{{ test_network_1.network.name }}"
        cidr: "{{ cidr_block_1 }}.0/24"
        dns_nameservers: "{{ ['100.125.4.25', '8.8.8.8'] }}"
      register: test_subnet_1

    - name: Create first router for test
      openstack.cloud.router:
        name: "{{ router_name_1 }}"
        state: present
        network: admin_external_net
        enable_snat: "{{ has_snat | ternary(true, omit) }}"
        interfaces:
          - net: "{{ test_network_1.network.name }}"
            subnet: "{{ test_subnet_1.subnet.name }}"
      register: test_router_1

    - name: Create second network for test
      openstack.cloud.network:
        name: "{{ network_name_2 }}"
        state: present
      register: test_network_2

    - name: Create second subnet for test
      openstack.cloud.subnet:
        name: "{{ subnet_name_2 }}"
        state: present
        network_name: "{{ test_network_2.network.name }}"
        cidr: "{{ cidr_block_2 }}.0/24"
        dns_nameservers: "{{ ['100.125.4.25', '8.8.8.8'] }}"
      register: test_subnet_2

    - name: Create second router for test
      openstack.cloud.router:
        name: "{{ router_name_2 }}"
        state: present
        network: admin_external_net
        enable_snat: "{{ has_snat | ternary(true, omit) }}"
        interfaces:
          - net: "{{ test_network_2.network.name }}"
            subnet: "{{ test_subnet_2.subnet.name }}"
      register: test_router_2

    - name: Create vpc peering
      opentelekomcloud.cloud.vpc_peering:
        name: "{{ vpc_peering_name }}"
        local_router: "{{ test_router_1.router.id }}"
        local_project: "{{ project_id }}"
        remote_router: "{{ test_router_2.router.id }}"
        remote_project: "{{ project_id }}"
      register: vpc_peering

    - name: Create vpc route -check mode
      opentelekomcloud.cloud.vpc_route:
        destination: "{{ test_subnet_2.subnet.cidr }}"
        nexthop: "{{ vpc_peering.vpc_peering.id }}"
        router: "{{ test_router_1.router.id }}"
      register: vpc_route_check
      check_mode: true

    - name: Assert result
      ansible.builtin.assert:
        that:
          - vpc_route_check is changed

    - name: Create vpc route
      opentelekomcloud.cloud.vpc_route:
        destination: "{{ test_subnet_2.subnet.cidr }}"
        nexthop: "{{ vpc_peering.vpc_peering.id }}"
        router: "{{ test_router_1.router.id }}"
      register: vpc_route

    - name: Assert result
      ansible.builtin.assert:
        that:
          - vpc_route is success
          - vpc_route is changed

  always:
    - name: Drop registered VPC route
      opentelekomcloud.cloud.vpc_route:
        route_id: "{{ vpc_route.vpc_route.id }}"
        state: absent
      register: dropped_route
      until: dropped_route is success
      retries: 5
      delay: 5
      failed_when: false
      when:
        - vpc_route is defined
        - vpc_route.vpc_route is defined
        - vpc_route.vpc_route.id is defined

    - name: Find remaining test VPC routes
      opentelekomcloud.cloud.vpc_route_info:
        router: "{{ test_router_1.router.id }}"
        destination: "{{ test_subnet_2.subnet.cidr }}"
      register: remaining_routes
      until: remaining_routes is success
      retries: 5
      delay: 5
      failed_when: false
      when:
        - test_router_1 is defined
        - test_router_1.router is defined
        - test_subnet_2 is defined
        - test_subnet_2.subnet is defined

    - name: Drop remaining test VPC routes
      opentelekomcloud.cloud.vpc_route:
        route_id: "{{ item.id }}"
        state: absent
      loop: "{{ remaining_routes.vpc_routes | default([]) }}"
      register: dropped_remaining_route
      until: dropped_remaining_route is success
      retries: 5
      delay: 5
      failed_when: false

    - name: Drop VPC peering
      opentelekomcloud.cloud.vpc_peering:
        name: "{{ vpc_peering_name }}"
        state: absent
      register: dropped_peering
      until: dropped_peering is success
      retries: 10
      delay: 5
      failed_when: false
      when: vpc_peering_name is defined

    - name: Drop first router
      openstack.cloud.router:
        name: "{{ router_name_1 }}"
        state: absent
      register: dropped_router_1
      until: dropped_router_1 is success
      retries: 10
      delay: 5
      failed_when: false
      when: router_name_1 is defined

    - name: Drop second router
      openstack.cloud.router:
        name: "{{ router_name_2 }}"
        state: absent
      register: dropped_router_2
      until: dropped_router_2 is success
      retries: 10
      delay: 5
      failed_when: false
      when: router_name_2 is defined

    - name: Drop first subnet
      openstack.cloud.subnet:
        name: "{{ subnet_name_1 }}"
        state: absent
      register: dropped_subnet_1
      until: dropped_subnet_1 is success
      retries: 10
      delay: 5
      failed_when: false
      when: subnet_name_1 is defined

    - name: Drop second subnet
      openstack.cloud.subnet:
        name: "{{ subnet_name_2 }}"
        state: absent
      register: dropped_subnet_2
      until: dropped_subnet_2 is success
      retries: 10
      delay: 5
      failed_when: false
      when: subnet_name_2 is defined

    - name: Drop first network
      openstack.cloud.network:
        name: "{{ network_name_1 }}"
        state: absent
      register: dropped_network_1
      until: dropped_network_1 is success
      retries: 10
      delay: 5
      failed_when: false
      when: network_name_1 is defined

    - name: Drop second network
      openstack.cloud.network:
        name: "{{ network_name_2 }}"
        state: absent
      register: dropped_network_2
      until: dropped_network_2 is success
      retries: 10
      delay: 5
      failed_when: false
      when: network_name_2 is defined
